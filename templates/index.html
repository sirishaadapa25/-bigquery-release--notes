<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore and search BigQuery release notes. Select updates and tweet them instantly. Fast, clean, dark-mode dashboard.">
    <title>BigQuery Release Explorer & Share</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/google-cloud.png">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo-container">
                <div class="bq-logo" id="header-logo">
                    <!-- Custom SVG representing BigQuery/Cloud DB -->
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 4.69 2 8v8c0 3.31 4.48 6 10 6s10-2.69 10-6V8c0-3.31-4.48-6-10-6zm0 18c-4.41 0-8-1.79-8-4v-2.28c1.92 1.37 4.79 2.28 8 2.28s6.08-.91 8-2.28V16c0 2.21-3.59 4-8 4zm0-6c-4.41 0-8-1.79-8-4V5.72c1.92 1.37 4.79 2.28 8 2.28s6.08-.91 8-2.28V10c0 2.21-3.59 4-8 4zm0-6c-4.41 0-8-1.79-8-4s3.59-4 8-4 8 1.79 8 4-3.59 4-8 4z"/>
                    </svg>
                </div>
                <span style="font-weight: 700; font-size: 1.5rem; letter-spacing: -0.01em;">Google Cloud</span>
            </div>
            <h1>BigQuery Release Explorer</h1>
            <p class="subtitle">Search, filter, and track live updates directly from the official Google BigQuery release notes feed, and share them on X (Twitter).</p>
        </header>

        <!-- Stats Section -->
        <section class="stats-bar" aria-label="Releases overview statistics">
            <div class="stat-card" style="--bg-border-top: linear-gradient(to right, var(--accent-start), var(--accent-end));">
                <div class="stat-val" id="stat-total">-</div>
                <div class="stat-lbl">Total Updates</div>
            </div>
            <div class="stat-card" style="--bg-border-top: var(--color-feature);">
                <div class="stat-val" id="stat-features">-</div>
                <div class="stat-lbl">Features</div>
            </div>
            <div class="stat-card" style="--bg-border-top: var(--color-announcement);">
                <div class="stat-val" id="stat-announcements">-</div>
                <div class="stat-lbl">Announcements</div>
            </div>
            <div class="stat-card" style="--bg-border-top: var(--color-issue);">
                <div class="stat-val" id="stat-alerts">-</div>
                <div class="stat-lbl">Issues & Breaking</div>
            </div>
        </section>

        <!-- Controls Section -->
        <section class="controls-section" aria-label="Controls and filters">
            <!-- Search bar -->
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="search" id="search-input" class="search-input" placeholder="Search updates, features, keywords, dates...">
            </div>

            <!-- Categories Toggles -->
            <div class="filters-container" id="filters-container">
                <button class="filter-pill active" data-filter="all">All</button>
                <button class="filter-pill" data-filter="features">Features</button>
                <button class="filter-pill" data-filter="announcements">Announcements</button>
                <button class="filter-pill" data-filter="changes">Changes</button>
                <button class="filter-pill" data-filter="breaking">Breaking & Issues</button>
            </div>

            <!-- Refresh Button -->
            <div class="refresh-container">
                <button class="btn-refresh" id="btn-refresh">
                    <span class="spinner"></span>
                    <svg class="refresh-icon-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
                    </svg>
                    Refresh Notes
                </button>
            </div>
        </section>

        <!-- Feed List -->
        <main class="releases-feed" id="releases-feed">
            <!-- Injected by JavaScript -->
        </main>
    </div>

    <!-- Twitter / X Composer Modal -->
    <div class="modal-overlay" id="tweet-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-id">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-title" id="modal-title-id">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                    </svg>
                    Compose Post
                </div>
                <button class="btn-close-modal" id="btn-close-modal" aria-label="Close composer modal">&times;</button>
            </div>
            <div class="modal-body">
                <p class="composer-preview-header">Draft Content</p>
                <textarea class="tweet-textarea" id="tweet-textarea" placeholder="What's happening?"></textarea>
                <div class="composer-footer">
                    <span class="char-counter" id="char-counter">0 / 280</span>
                    <button class="btn-post" id="btn-post">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                        </svg>
                        Post to X
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
